name: 项目校验

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.14"]
    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 运行单元测试
        run: python3 -m unittest discover -s tests -v

  static-checks:
    name: 脚本与配置检查
    runs-on: ubuntu-24.04
    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: 检查 Shell 脚本
        run: |
          bash -n entrypoint.sh scale.sh doctor.sh install.sh update.sh uninstall.sh
          shellcheck -x entrypoint.sh scale.sh doctor.sh install.sh update.sh uninstall.sh

      - name: 检查 Dockerfile
        run: docker run --rm -i hadolint/hadolint < Dockerfile

      - name: 检查 Compose 与业务配置
        env:
          HYDRO_SERVER_URL: https://oj.example.net/
          HYDRO_JUDGE_UNAME: ci-judge
          HYDRO_JUDGE_PASSWORD: ci-only-password
        run: |
          docker compose --env-file .env.example config --quiet
          docker compose --env-file .env.example config --format json | python3 validate_config.py
